name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["T-Fix"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide detailed information to help us understand and fix the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the bug in 1-2 sentences.
      placeholder: wellfeather panics when connecting to a PostgreSQL database with a malformed connection string instead of showing an error.
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is currently happening?
      placeholder: |
        Clicking "Connect" with an invalid host causes the application to crash
        instead of displaying an error message in the connection dialog.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: |
        The connection dialog should display an inline error message
        (e.g. "Failed to connect: invalid host") and remain open.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or configuration to reproduce the bug.
      placeholder: |
        1. Open wellfeather
        2. Click "Add Connection"
        3. Enter host: `not-a-valid-host%%`, port: 5432
        4. Click "Connect" → app crashes

        Or: `RUST_LOG=debug just run` and observe the output.
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error Output / Backtrace
      description: Include any error messages, panics, or backtraces (`RUST_BACKTRACE=1`).
      placeholder: |
        thread 'main' panicked at 'called `Option::unwrap()` on a `None` value', app/src/ui/connection.rs:87
        stack backtrace:
           0: rust_begin_unwind
           1: wellfeather::ui::connection::handle_connect
           ...
      render: shell

  - type: input
    id: app_version
    attributes:
      label: wellfeather Version
      description: Which version of wellfeather are you using? (`wellfeather --version` or from the title bar)
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide your environment information.
      placeholder: |
        - OS: Windows 11 / macOS 15 / Ubuntu 24.04
        - Rust: rustc 1.87.0 (output of `rustc --version`)
        - DB type: PostgreSQL 17 / MySQL 8.4 / SQLite 3.47
        - Architecture: x86_64 / aarch64
      render: markdown
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context that might be helpful (config snippets, related issues, workarounds).
      placeholder: |
        - Only reproducible with PostgreSQL; MySQL connects fine
        - Workaround: editing config.toml directly avoids the crash
        - Related to issue #123

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided steps to reproduce the bug
          required: true
        - label: I have tested on the latest release
          required: false
